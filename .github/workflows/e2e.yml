name: e2e

on:
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        env:
          E2E_BASE_URL: http://localhost:3000
          # Required for auth-login.spec.ts
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          # Required for team-flow.spec.ts and integrations-exports.spec.ts
          E2E_TEAM_EMAIL: ${{ secrets.E2E_TEAM_EMAIL }}
          E2E_TEAM_PASSWORD: ${{ secrets.E2E_TEAM_PASSWORD }}
          E2E_INVITEE_EMAIL: ${{ secrets.E2E_INVITEE_EMAIL }}
          E2E_WEBHOOK_TARGET_URL: ${{ secrets.E2E_WEBHOOK_TARGET_URL }}
          # Client env required by app startup
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_DB_SCHEMA: api
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npm run test:e2e


name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: ['*']

# Cancel in-progress runs for the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    
    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Typecheck
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build
        run: npm run build:ci
        continue-on-error: false

      - name: Content audit
        run: npm run content:audit
        continue-on-error: false

      - name: Check no legacy support email
        run: npm run check:no-old-support-email
        continue-on-error: false

      - name: Unit tests
        run: npm run test:unit
        continue-on-error: false


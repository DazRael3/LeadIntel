version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Phoenix"
    open-pull-requests-limit: 10
    groups:
      next-stack:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      test-tooling:
        patterns:
          - "@playwright/*"
          - "playwright"
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
      tailwind-stack:
        patterns:
          - "tailwindcss*"
          - "postcss"
          - "autoprefixer"